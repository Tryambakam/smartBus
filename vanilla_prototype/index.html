<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Where is my Bus? | Official Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Clean, Official Governmental Theme */
    :root {
      --gov-blue: #0f172a;
      --gov-white: #ffffff;
      --gov-bg: #ffffff;
      --gov-text: #1e293b;
      --gov-muted: #64748b;
      --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      --gold: #d4af37;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
    
    body { 
      background-color: var(--gov-bg); 
      color: var(--gov-text); 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
      /* Elegant grey map pattern - subtle dots to represent a grid/map */
      background-image: radial-gradient(circle at center, #cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
    }
    
    /* Header */
    header { 
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0; 
      padding: 12px 24px; 
      display: flex; 
      justify-content: space-between;
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 50; 
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .crest {
      height: 40px;
      width: auto;
      object-fit: contain;
      filter: grayscale(100%) opacity(0.85); /* subtle */
    }

    .header-logo { 
      width: 36px; 
      height: 36px; 
      background: var(--gov-blue);
      color: var(--gov-white); 
      border-radius: 8px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      font-size: 18px; 
    }
    
    .header-titles { display: flex; flex-direction: column; }
    .header-dept { font-size: 11px; font-weight: 600; color: var(--gov-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .header-brand { font-size: 18px; font-weight: 700; color: var(--gov-blue); letter-spacing: -0.3px; }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-icon {
      color: var(--gov-muted);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-icon:hover { color: var(--gov-blue); }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--gov-blue);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: #f1f5f9; }
    .gold-padlock { color: var(--gold); font-size: 15px; }
    
    /* Main Layout */
    main { 
      flex: 1; 
      width: 100%; 
      max-width: 640px; 
      margin: 0 auto; 
      padding: 64px 24px; 
      display: flex; 
      flex-direction: column; 
    }
    
    .hero-section {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 { 
      font-size: 44px; 
      font-weight: 800; 
      letter-spacing: -1.2px; 
      color: var(--gov-blue); 
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 17px;
      color: var(--gov-muted);
      font-weight: 400;
    }
    
    /* Search Bar */
    .search-wrapper { margin-bottom: 32px; width: 100%; }
    .search-container { 
      position: relative; 
      width: 100%; 
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
      border-radius: 999px;
      background: #fff;
    }
    .search-icon { 
      position: absolute; 
      left: 28px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: var(--gov-blue); 
      font-size: 20px; 
    }
    .search-input { 
      width: 100%; 
      padding: 24px 32px 24px 64px; 
      font-size: 20px; 
      border: 1px solid #e2e8f0; 
      background: transparent; 
      border-radius: 999px; 
      outline: none; 
      transition: all 0.3s ease; 
      color: var(--gov-text); 
      font-weight: 500; 
    }
    .search-input:focus { 
      border-color: var(--gov-blue);
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
    }
    .search-input::placeholder { color: #94a3b8; font-weight: 400; }

    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 56px;
    }

    .btn-nearby {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--gov-blue);
      background: #fff;
      border: 1px solid #e2e8f0;
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      transition: all 0.2s;
    }
    .btn-nearby:hover {
      border-color: var(--gov-blue);
      background: #f8fafc;
      transform: translateY(-1px);
    }
    .btn-nearby i { font-size: 18px; color: var(--gov-blue); }

    /* Results */
    .section-title { 
      font-size: 13px; 
      font-weight: 700; 
      color: var(--gov-muted); 
      text-transform: uppercase; 
      letter-spacing: 1.2px; 
      margin-bottom: 20px; 
      margin-left: 8px; 
    }
    .list-container { 
      display: flex; 
      flex-direction: column; 
      gap: 16px; 
    }
    .card { 
      background: #fff; 
      border: none; 
      border-radius: 16px; 
      padding: 24px; 
      display: flex; 
      align-items: center; 
      gap: 20px; 
      cursor: pointer; 
      transition: transform 0.2s, box-shadow 0.2s; 
      box-shadow: var(--card-shadow); 
    }
    .card:hover { 
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }
    .card-icon { 
      width: 48px; 
      height: 48px; 
      background: #f1f5f9; 
      color: var(--gov-blue); 
      border-radius: 50%; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      font-size: 20px; 
      flex-shrink: 0; 
    }
    .card-info { flex: 1; display: flex; flex-direction: column; }
    .card-title { font-size: 18px; font-weight: 600; color: var(--gov-text); margin-bottom: 6px; }
    .card-subtitle { font-size: 15px; color: var(--gov-muted); font-weight: 400; }
    .card-arrow { color: #cbd5e1; font-size: 18px; margin-left: 12px; transition: transform 0.2s; }
    .card:hover .card-arrow { transform: translateX(6px); color: var(--gov-blue); }

    /* Tracking View (simplified for demo) */
    #tracking-view { display: none; width: 100%; animation: fadeIn 0.3s ease; }
    .back-btn { background: none; border: none; font-size: 16px; font-weight: 500; color: var(--gov-muted); display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 32px; transition: color 0.2s; }
    .back-btn:hover { color: var(--gov-blue); }
    
    .hero-card { background: #fff; border-radius: 20px; padding: 32px; margin-bottom: 32px; box-shadow: var(--card-shadow); }
    .hero-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
    .hero-labels { display: flex; flex-direction: column; gap: 10px; }
    .hero-badge { display: inline-flex; align-items: center; padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-weight: 700; color: var(--gov-blue); text-transform: uppercase; letter-spacing: 0.5px; }
    .hero-status { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--gov-muted); }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .status-dot.green { background: #10B981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2); }
    .status-dot.amber { background: #F59E0B; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2); }
    .hero-title { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px; color: var(--gov-blue); }
    
    .eta-box { text-align: center; padding: 32px 0; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; margin-bottom: 32px; }
    .eta-label { font-size: 14px; font-weight: 700; color: var(--gov-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
    .eta-stop { font-size: 24px; font-weight: 600; margin-bottom: 16px; color: var(--gov-text); }
    .eta-time { font-size: 18px; font-weight: 500; color: var(--gov-muted); display: flex; justify-content: center; align-items: baseline; gap: 10px; }
    .eta-time span { font-size: 56px; font-weight: 800; letter-spacing: -2px; color: var(--gov-blue); line-height: 1; }
    
    .progress-container { width: 100%; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--gov-muted); text-transform: uppercase; margin-bottom: 16px; letter-spacing: 0.5px; }
    .progress-bar-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; position: relative; }
    .progress-bar-fill { height: 100%; background: var(--gov-blue); width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }

    /* Footer */
    footer { 
      text-align: center; 
      padding: 40px 24px; 
      font-size: 13px; 
      font-weight: 500; 
      color: #94a3b8; 
      margin-top: auto; 
    }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      h1 { font-size: 36px; }
      .search-input { padding: 20px 24px 20px 52px; font-size: 18px; }
      header { padding: 12px 16px; }
      main { padding: 40px 16px; }
      .header-titles { display: none; } /* Simplify header on tiny screens */
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <!-- Indian State Crest -->
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="State Crest" class="crest">
      <div class="header-logo">
        <i class="fa-solid fa-bus"></i>
      </div>
      <div class="header-titles">
        <span class="header-dept">Official Public Transport Portal</span>
        <span class="header-brand">smartBus</span>
      </div>
    </div>
    <div class="header-right">
      <i class="fa-solid fa-earth-americas nav-icon" title="Language"></i>
      <i class="fa-solid fa-moon nav-icon" title="Theme"></i>
      <a href="#" class="logout-btn">
        <i class="fa-solid fa-lock gold-padlock"></i>
        Logout
      </a>
    </div>
  </header>

  <main>
    <div id="search-view">
      <div class="hero-section">
        <h1>Where is my bus?</h1>
        <p class="subtitle">Secure live tracking for officially validated routes.</p>
      </div>

      <div class="search-wrapper">
        <div class="search-container">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="bus-search" class="search-input" placeholder="Search route, bus number, or stop..." autocomplete="off">
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn-nearby">
          <i class="fa-solid fa-location-crosshairs"></i>
          Find Nearby Bus
        </button>
      </div>
      
      <div class="section-title" id="results-title">Recent Tracking</div>
      <div class="list-container" id="results-list">
        <!-- Injected via JS -->
      </div>
    </div>

    <div id="tracking-view">
      <button class="back-btn" onclick="showSearch()"><i class="fa-solid fa-arrow-left"></i> Back to search</button>
      
      <div class="hero-card">
        <div class="hero-header">
          <div class="hero-labels">
            <div class="hero-badge" id="tv-badge">Bus R-101</div>
            <div class="hero-status"><div class="status-dot green" id="tv-dot"></div><span id="tv-status">On time</span></div>
            <div class="hero-title" id="tv-title">Route Name</div>
          </div>
        </div>
        
        <div class="eta-box">
          <div class="eta-label">Next Stop</div>
          <div class="eta-stop" id="tv-stop">Terminal</div>
          <div class="eta-time" id="tv-eta-container">Arriving in <span id="tv-eta">--</span> min</div>
        </div>

        <div class="progress-container">
          <div class="progress-labels">
            <span>Origin</span>
            <span style="display:flex;align-items:center;gap:6px;">
              <i class="fa-solid fa-gauge-high"></i>
              <span id="tv-speed">42 km/h</span>
            </span>
            <span>Terminal</span>
          </div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="tv-progress"></div></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Department of Transportation. Secure, official portal.</p>
  </footer>

  <script>
    // Mock Data Matrix (Reused logic)
    const mockRoutes = [
      { id: '1', name: 'Chandigarh to Ludhiana', busId: 'PB-01-1001', stops: ['Sector 43 ISBT', 'Kharar', 'Morinda', 'Samrala', 'Ludhiana ISBT'] },
      { id: '2', name: 'Delhi to Patiala', busId: 'DL-11-2041', stops: ['Kashmere Gate ISBT', 'Karnal', 'Ambala', 'Rajpura', 'Patiala Bus Stand'] },
      { id: '3', name: 'Amritsar to Jalandhar', busId: 'PB-02-5432', stops: ['Amritsar ISBT', 'Beas', 'Kartarpur', 'Jalandhar City'] },
      { id: '4', name: 'Shimla to Chandigarh', busId: 'HP-63-9999', stops: ['Shimla ISBT', 'Solan', 'Dharampur', 'Parwanoo', 'Sector 43 ISBT'] }
    ];

    let currentSimulationInterval = null;
    let activeRouteParams = null;
    let globalStopIndex = 0;

    const searchView = document.getElementById('search-view');
    const trackingView = document.getElementById('tracking-view');
    const searchInput = document.getElementById('bus-search');
    const resultsList = document.getElementById('results-list');
    const resultsTitle = document.getElementById('results-title');
    
    // Fuzzy sub-sequence matching
    function fuzzyMatch(str, pattern) {
      if(!pattern) return true;
      const s = String(str).toLowerCase().replace(/\s+/g, "");
      const p = String(pattern).toLowerCase().replace(/\s+/g, "");
      let pIdx = 0;
      for (let i = 0; i < s.length && pIdx < p.length; i++) {
        if (s[i] === p[pIdx]) pIdx++;
      }
      return pIdx === p.length;
    }

    // Render Lists
    function renderList(query) {
      resultsList.innerHTML = '';
      let matches = [];
      if(!query) {
        resultsTitle.innerText = "Recent Tracking";
        matches = mockRoutes.slice(0,3);
      } else {
        resultsTitle.innerText = "Search Results";
        matches = mockRoutes.filter(r => fuzzyMatch(r.name, query) || fuzzyMatch(r.busId, query) || r.stops.some(st => fuzzyMatch(st, query)));
      }

      if(matches.length === 0) {
        resultsList.innerHTML = '<div style="text-align:center;padding:32px;color:#94a3b8;font-size:15px;">No official routes found.</div>';
        return;
      }

      matches.forEach(m => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div class="card-icon"><i class="fa-solid fa-location-dot"></i></div>
          <div class="card-info">
            <span class="card-title">${m.name}</span>
            <span class="card-subtitle">Bus ${m.busId}</span>
          </div>
          <i class="fa-solid fa-arrow-right card-arrow"></i>
        `;
        div.onclick = () => launchTracking(m);
        resultsList.appendChild(div);
      });
    }

    searchInput.addEventListener('input', (e) => renderList(e.target.value));

    // Execution Core
    function launchTracking(route) {
      searchView.style.display = 'none';
      trackingView.style.display = 'block';
      
      activeRouteParams = route;
      globalStopIndex = 0; // reset
      
      document.getElementById('tv-badge').innerText = `Bus ${route.busId}`;
      document.getElementById('tv-title').innerText = route.name;

      renderTrackingFrame();
      if(currentSimulationInterval) clearInterval(currentSimulationInterval);
      
      currentSimulationInterval = setInterval(() => {
        globalStopIndex++;
        if(globalStopIndex >= route.stops.length) globalStopIndex = 0; // loop
        renderTrackingFrame();
      }, 5000); 
    }

    function renderTrackingFrame() {
      const stops = activeRouteParams.stops;
      const totalStops = Math.max(1, stops.length - 1);
      const isTerminal = globalStopIndex === totalStops;
      const progress = Math.min(100, (globalStopIndex / totalStops) * 100);
      
      document.getElementById('tv-progress').style.width = `${progress}%`;
      
      const speed = isTerminal ? "0" : "42";
      document.getElementById('tv-speed').innerText = `${speed} km/h`;
      
      const dot = document.getElementById('tv-dot');
      const statusLbl = document.getElementById('tv-status');
      if (speed === "0") {
        dot.className = "status-dot amber";
        statusLbl.innerText = isTerminal ? "Journey Complete" : "Stopped";
      } else {
        dot.className = "status-dot green";
        statusLbl.innerText = "On time";
      }

      const nextStop = isTerminal ? stops[globalStopIndex] : stops[globalStopIndex+1];
      document.getElementById('tv-stop').innerText = nextStop;

      const etaContainer = document.getElementById('tv-eta-container');
      if(isTerminal) {
        etaContainer.innerHTML = 'Terminal <span style="font-size:40px;">Reached</span>';
      } else {
        const randEta = Math.floor(Math.random()*4)+2;
        etaContainer.innerHTML = `Arriving in <span id="tv-eta">${randEta}</span> min`;
      }
    }

    function showSearch() {
      if(currentSimulationInterval) clearInterval(currentSimulationInterval);
      trackingView.style.display = 'none';
      searchView.style.display = 'block';
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      // By default open the search view
      searchView.style.display = 'block';
      renderList("");
    });
  </script>
</body>
</html>
